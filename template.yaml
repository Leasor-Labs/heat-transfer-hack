AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: HeatGrid API - API Gateway, Lambda, DynamoDB (Amplify-compatible)

Parameters:
  Stage:
    Type: String
    Default: dev
    Description: Stage name for the API

Globals:
  Function:
    Timeout: 30
    Runtime: nodejs20.x
    MemorySize: 256

Resources:
  HeatSourcesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: HeatSources
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: industry
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: industry-index
          KeySchema:
            - AttributeName: industry
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  HeatConsumersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: HeatConsumers
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: category
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: category-index
          KeySchema:
            - AttributeName: category
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  HeatGridApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub heatgrid-api-${Stage}
      StageName: !Ref Stage
      Cors:
        AllowMethods: "'GET,POST,OPTIONS'"
        AllowHeaders: "'Content-Type,x-api-key'"
        AllowOrigin: "'*'"
      Auth:
        ApiKeyRequired: false

  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: index.handler
      CodeUri: build/
      Environment:
        Variables:
          HEAT_SOURCES_TABLE: !Ref HeatSourcesTable
          HEAT_CONSUMERS_TABLE: !Ref HeatConsumersTable
          AWS_NODEJS_CONNECTION_REUSE_ENABLED: "1"
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref HeatSourcesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref HeatConsumersTable
      Events:
        Proxy:
          Type: Api
          Properties:
            RestApiId: !Ref HeatGridApi
            Path: /api/{proxy+}
            Method: ANY

  HeatGridApiKey:
    Type: AWS::ApiGateway::ApiKey
    Properties:
      Name: !Sub heatgrid-api-key-${Stage}
      Description: Optional API key for HeatGrid API (not required by default)
      Enabled: true

  HeatGridUsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    Properties:
      UsagePlanName: !Sub heatgrid-usage-plan-${Stage}
      Description: Usage plan for HeatGrid API

  HeatGridUsagePlanKey:
    Type: AWS::ApiGateway::UsagePlanKey
    DependsOn: HeatGridUsagePlan
    Properties:
      KeyId: !Ref HeatGridApiKey
      KeyType: API_KEY
      UsagePlanId: !Ref HeatGridUsagePlan

Outputs:
  ApiUrl:
    Description: API Gateway base URL (set HEATGRID_API_BASE_URL in Amplify to this value)
    Value: !Sub https://${HeatGridApi}.execute-api.${AWS::Region}.amazonaws.com/${Stage}
    Export:
      Name: !Sub ${AWS::StackName}-ApiUrl
  HeatSourcesTableName:
    Value: !Ref HeatSourcesTable
  HeatConsumersTableName:
    Value: !Ref HeatConsumersTable
  ApiKeyId:
    Description: API Key ID (optional; use in Amplify if you enable key requirement later)
    Value: !Ref HeatGridApiKey
