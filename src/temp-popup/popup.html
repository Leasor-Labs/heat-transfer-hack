<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DynamoDB Data – HeatGrid</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="popup-header">
        <h1>Data from DynamoDB</h1>
        <p id="popupSubtitle" class="subtitle">Heat sources and consumers (from backend)</p>
        <button id="closeBtn" class="btn-close" type="button" aria-label="Close">×</button>
    </div>
    <div id="popupLoading" class="popup-loading">
        <span class="spinner"></span> Loading...
    </div>
    <div id="popupError" class="popup-error" style="display: none;"></div>
    <div id="popupContent" class="popup-content" style="display: none;">
        <section class="section">
            <h2>Heat Sources</h2>
            <div id="sourcesTableWrap" class="table-wrap"></div>
        </section>
        <section class="section">
            <h2>Heat Consumers</h2>
            <div id="consumersTableWrap" class="table-wrap"></div>
        </section>
    </div>
    <script src="popup.js"></script>
</body>
</html>
