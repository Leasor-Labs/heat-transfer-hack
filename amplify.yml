version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install
    build:
      commands:
        # Repo root (Amplify may run from parent of heat-transfer-hack)
        - |
          REPO_ROOT="${CODEBUILD_SRC_DIR:-.}"
          [ -d "heat-transfer-hack" ] && REPO_ROOT="heat-transfer-hack"
          cd "$REPO_ROOT"
          chmod +x node_modules/.bin/* 2>/dev/null || true
        # Seed DynamoDB with Toledo data (only if script exists and tables are set)
        - |
          REPO_ROOT="${CODEBUILD_SRC_DIR:-.}"
          [ -d "build" ] && REPO_ROOT="build"
          cd "$REPO_ROOT"
          export HEAT_SOURCES_TABLE="${HEAT_SOURCES_TABLE:-HeatSources}"
          export HEAT_CONSUMERS_TABLE="${HEAT_CONSUMERS_TABLE:-HeatConsumers}"
          export AWS_REGION="${AWS_REGION:-us-east-1}"
          if [ -n "$HEAT_SOURCES_TABLE" ] && [ -n "$HEAT_CONSUMERS_TABLE" ] && [ -f "src/data/seedDynamoFromToledo.ts" ]; then
            npx ts-node src/data/seedDynamoFromToledo.ts || true
          fi
        # Inject API URL into frontend (set REACT_APP_API_URL in Amplify env to your API Gateway URL)
        - |
          REPO_ROOT="${CODEBUILD_SRC_DIR:-.}"
          [ -d "build" ] && REPO_ROOT="build"
          cd "$REPO_ROOT"
          API_URL="${REACT_APP_API_URL:-}"
          API_URL="${API_URL%/}"
          if [ -n "$API_URL" ] && [ -f "build/index.html" ]; then
            sed -i.bak "s|window.HEATGRID_API_BASE_URL = \"\"|window.HEATGRID_API_BASE_URL = \"$API_URL\"|" build/index.html
            echo "Injected HEATGRID_API_BASE_URL=$API_URL"
          fi
  artifacts:
    baseDirectory: build
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
