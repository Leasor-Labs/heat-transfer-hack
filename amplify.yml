version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
        - npm run build:lambda
        - pip install --user aws-sam-cli
        - sam build
    build:
      commands:
        - node scripts/inject-api-url.js
    postBuild:
      commands:
        - sam deploy --no-confirm-changeset --no-fail-on-empty-changeset --stack-name $SAM_STACK_NAME --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM --region $AWS_REGION --parameter-overrides Stage=$SAM_STAGE
  artifacts:
    baseDirectory: .
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
