version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install
    build:
      commands:
        # 0. Ensure repo root (Amplify/CodeBuild)
        - export REPO_ROOT="${CODEBUILD_SRC_DIR:-.}" && cd "$REPO_ROOT"
        # 1. Deploy backend (CDK) — set account/region for CDK
        - |
          export CDK_DEFAULT_ACCOUNT="${AWS_ACCOUNT_ID:-$CDK_DEFAULT_ACCOUNT}"
          export CDK_DEFAULT_REGION="${AWS_REGION:-us-east-1}"
          cd "$REPO_ROOT/infrastructure" && npm install
          npx cdk bootstrap --force 2>/dev/null || true
          npx cdk deploy --require-approval never --outputs-file "$REPO_ROOT/cdk-outputs.json"
        # 2. Get API URL from stack output
        - |
          cd "$REPO_ROOT"
          API_URL=$(node -e "
          try {
            const o = require('./cdk-outputs.json');
            const url = o?.HeatTransferStack?.ApiUrl ?? Object.values(o || {})[0]?.ApiUrl ?? '';
            console.log(String(url).replace(/\/$/, ''));
          } catch (e) { console.log(''); }
          ")
          echo "ApiUrl=$API_URL"
          echo "$API_URL" > api_url.txt
        # 3. Seed DynamoDB (Toledo data)
        - |
          cd "$REPO_ROOT"
          export HEAT_SOURCES_TABLE=HeatSources
          export HEAT_CONSUMERS_TABLE=HeatConsumers
          export AWS_REGION=${AWS_REGION:-us-east-1}
          npx ts-node src/data/seedDynamoFromToledo.ts
        # 4. Inject API URL into frontend
        - |
          cd "$REPO_ROOT"
          if [ -f api_url.txt ] && [ -n "$(cat api_url.txt)" ]; then
            API_URL=$(cat api_url.txt)
            sed -i.bak "s|window.HEATGRID_API_BASE_URL = \"\"|window.HEATGRID_API_BASE_URL = \"$API_URL\"|" index.html
            echo "Injected HEATGRID_API_BASE_URL=$API_URL"
          fi
  artifacts:
    baseDirectory: .
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - infrastructure/node_modules/**/*
