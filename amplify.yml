version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm use 18 || true
        - npm ci
        - npm run build:lambda
    build:
      commands:
        - |
          ARTIFACT_KEY="heatgrid/builds/${CODEBUILD_BUILD_ID:-manual}/build.zip"
          cd build && zip -r ../build.zip . && cd ..
          aws s3 cp build.zip "s3://${LAMBDA_ARTIFACTS_BUCKET}/${ARTIFACT_KEY}"
          echo "LAMBDA_ARTIFACT_KEY=${ARTIFACT_KEY}" >> env.txt
        - node scripts/inject-api-url.js
    postBuild:
      commands:
        - |
          source env.txt 2>/dev/null || true
          aws cloudformation deploy --template-file template-cfn.yaml --stack-name $SAM_STACK_NAME \
            --parameter-overrides "Stage=${SAM_STAGE:-dev}" "LambdaSourceBucket=${LAMBDA_ARTIFACTS_BUCKET}" "LambdaSourceKey=${LAMBDA_ARTIFACT_KEY:-heatgrid/builds/manual/build.zip}" \
            --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM --region $AWS_REGION --no-fail-on-empty-changeset
  artifacts:
    baseDirectory: .
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
